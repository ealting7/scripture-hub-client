<div class="sidebar-content">
  <div class="sidebar-header">
    <button 
      mat-icon-button 
      (click)="onToggle()" 
      [attr.aria-label]="isOpenSidebar() ? 'Collapse sidebar' : 'Expand sidebar'"
      class="toggle-btn">
      <mat-icon>{{ isOpenSidebar() ? 'chevron_left' : 'chevron_right' }}</mat-icon>
    </button>
  </div>

  <nav class="sidebar-nav">
    <sidebar-dashboard [isOpenDashboard]="isOpenSidebar()"></sidebar-dashboard>
    <sidebar-study [isOpenStudy]="isOpenSidebar()"></sidebar-study>
    <sidebar-community [isOpenCommunity]="isOpenSidebar()"></sidebar-community>
    <sidebar-church [isOpenChurch]="isOpenSidebar()"></sidebar-church>
    <sidebar-user-profile [isOpenProfile]="isOpenSidebar()"></sidebar-user-profile>
  </nav>
</div>
