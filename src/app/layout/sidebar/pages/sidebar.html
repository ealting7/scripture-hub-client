<div class="sidebar-content">
  <div class="sidebar-header">
    <button 
      mat-icon-button 
      (click)="onToggle()" 
      [attr.aria-label]="isOpen() ? 'Collapse sidebar' : 'Expand sidebar'"
      class="toggle-btn">
      <mat-icon>{{ isOpen() ? 'chevron_left' : 'chevron_right' }}</mat-icon>
    </button>
  </div>

  <nav class="sidebar-nav">
    <a class="nav-item" href="/dashboard" [title]="isOpen() ? '' : 'Dashboard'">
      <mat-icon>dashboard</mat-icon>
      <span class="nav-text" *ngIf="isOpen()">Dashboard</span>
    </a>

    <sidebar-study [isOpen]="isOpen()"></sidebar-study>
    <sidebar-community [isOpen]="isOpen()"></sidebar-community>
    <sidebar-church [isOpen]="isOpen()"></sidebar-church>

  </nav>
</div>
