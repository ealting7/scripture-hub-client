<div>
    @if (isOpenStudy()) {
      <div class="nav-header">Study</div>
    }

    <a class="nav-item" href="/bible-reader" (click)="handleSelectNaviationItem($event, 'Bible Reader')" [title]="isOpenStudy() ? '' : 'Bible Reader'">
      <mat-icon>auto_stories</mat-icon>
      @if (isOpenStudy()) {
        <span class="nav-text">Bible Reader</span>
      }
    </a>

    <a class="nav-item" href="/my-journal" (click)="handleSelectNaviationItem($event, 'My Journal')" [title]="isOpenStudy() ? '' : 'My Journal'">

        <span class="nav-text">My Journal</span>
      }
    </a>        

    <a class="nav-item" href="/sermon-study" (click)="handleSelectNaviationItem($event, 'Sermon Study')" [title]="isOpenStudy() ? '' : 'Sermon Study'">
      <mat-icon>school</mat-icon>

        <span class="nav-text">Sermon Study</span>
      }
    </a>

      <div class="nav-separator"></div>
